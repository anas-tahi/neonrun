<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonRun — 20 Stage Challenge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#08080f;font-family:'Space Grotesk',sans-serif;}
canvas{display:block;}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;}
#nameScreen,#charScreen,#welcomeScreen,#outroScreen{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#08080f;z-index:20;
}
.hidden{display:none!important;}
/* Name screen */
.nr-title{
  font-family:'JetBrains Mono',monospace;font-size:clamp(36px,7vw,72px);
  font-weight:700;letter-spacing:-.02em;
  background:linear-gradient(135deg,#50f0c8,#f050a0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:8px;
}
.nr-sub{color:#646e8c;font-size:16px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:48px;}
.nr-input-wrap{position:relative;margin-bottom:16px;}
.nr-input{
  background:#141430;border:2px solid #50f0c8;border-radius:10px;
  padding:16px 28px;font-family:'JetBrains Mono',monospace;
  font-size:22px;color:#dce6ff;outline:none;width:360px;text-align:center;
  box-shadow:0 0 30px rgba(80,240,200,.2);transition:box-shadow .2s;
}
.nr-input:focus{box-shadow:0 0 50px rgba(80,240,200,.35);}
.nr-hint{color:#646e8c;font-size:13px;letter-spacing:.06em;margin-top:10px;text-align:center;}
.nr-err{color:#f03c3c;font-size:13px;margin-top:8px;min-height:18px;text-align:center;}
.nr-btn{
  margin-top:24px;padding:14px 48px;background:#50f0c8;color:#08080f;
  border:none;border-radius:8px;font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:.05em;cursor:pointer;
  box-shadow:0 0 30px rgba(80,240,200,.4);transition:all .2s;pointer-events:all;
}
.nr-btn:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(80,240,200,.6);}
/* Grid bg */
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.screen-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
/* Char select */
.char-grid{display:flex;gap:20px;margin:28px 0 32px;}
.char-card{
  width:160px;padding:24px 16px 16px;border-radius:14px;
  border:2px solid #2a2a55;background:#141430;cursor:pointer;
  transition:all .25s;text-align:center;pointer-events:all;
}
.char-card:hover,.char-card.selected{border-color:var(--cc);box-shadow:0 0 30px color-mix(in srgb,var(--cc) 30%,transparent);}
.char-card .char-canvas{display:block;margin:0 auto 12px;}
.char-name{font-weight:700;font-size:15px;margin-bottom:4px;}
.char-desc{color:#646e8c;font-size:11px;line-height:1.5;}
.char-badge{
  display:inline-block;margin-top:10px;padding:3px 10px;
  border-radius:20px;font-size:10px;font-weight:700;
  font-family:'JetBrains Mono',monospace;letter-spacing:.08em;
  opacity:0;transition:opacity .2s;
}
.char-card.selected .char-badge{opacity:1;}
/* Welcome */
#welcomeScreen{background:#08080f;}
.welcome-msg{
  font-family:'JetBrains Mono',monospace;font-size:clamp(28px,5vw,52px);
  font-weight:700;text-align:center;margin-bottom:16px;
}
/* Outro */
.outro-title{
  font-family:'JetBrains Mono',monospace;font-size:clamp(32px,6vw,64px);
  font-weight:700;color:#50f0c8;text-align:center;margin-bottom:20px;
}
.outro-sub{color:#ffc83c;font-size:24px;font-weight:600;text-align:center;margin-bottom:12px;}
.outro-hint{color:#646e8c;font-size:14px;text-align:center;}
/* HUD */
#hud{
  position:fixed;inset:0;pointer-events:none;z-index:15;
  font-family:'JetBrains Mono',monospace;
}
.stage-badge{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(8,8,18,.85);border:1px solid #2a2a55;
  border-radius:20px;padding:6px 20px;font-size:13px;color:#50f0c8;
  letter-spacing:.08em;backdrop-filter:blur(8px);
}
.diff-label{
  position:absolute;top:48px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
}
.timer-box{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-size:22px;font-weight:700;
}
.hud-tl{position:absolute;top:14px;left:18px;}
.hud-tr{position:absolute;top:14px;right:18px;}
.player-label{color:#dce6ff;font-size:12px;}
.death-count{color:#646e8c;font-size:11px;margin-top:2px;}
.controls-hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  color:#646e8c;font-size:11px;letter-spacing:.06em;
  background:rgba(8,8,18,.7);padding:5px 16px;border-radius:20px;
}
</style>
</head>
<body>

<!-- GRID CANVAS (behind everything) -->
<canvas id="gridCanvas" class="grid-bg"></canvas>

<!-- MAIN GAME CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- NAME SCREEN -->
<div id="nameScreen">
  <div class="screen-content">
    <div class="nr-title">NEON RUN</div>
    <div class="nr-sub">The 20-Stage Challenge</div>
    <div class="nr-input-wrap">
      <input class="nr-input" id="nameInput" type="text" maxlength="16"
             placeholder="Your name..." autocomplete="off" spellcheck="false">
    </div>
    <div class="nr-err" id="nameErr"></div>
    <div class="nr-hint">Press ENTER or click to continue</div>
    <button class="nr-btn" id="nameBtn">Continue →</button>
  </div>
</div>

<!-- CHARACTER SELECT -->
<div id="charScreen" class="hidden">
  <div class="screen-content">
    <div class="nr-title" style="font-size:clamp(24px,4vw,42px);margin-bottom:4px">Choose Your Fighter</div>
    <div class="nr-sub" style="margin-bottom:24px" id="charSubtitle">Welcome — pick your character</div>
    <div class="char-grid" id="charGrid"></div>
    <button class="nr-btn" id="charBtn" style="background:#f050a0;box-shadow:0 0 30px rgba(240,80,160,.4)">
      Let's Go →
    </button>
    <div class="nr-hint" style="margin-top:12px">Arrow keys or click to choose</div>
  </div>
</div>

<!-- WELCOME SCREEN -->
<div id="welcomeScreen" class="hidden">
  <div class="screen-content">
    <div class="welcome-msg" id="welcomeMsg"></div>
    <canvas id="welcomeCharCanvas" width="100" height="140"></canvas>
    <div style="color:#646e8c;font-size:14px;margin-top:16px" id="welcomeSub"></div>
  </div>
</div>

<!-- HUD (shown during gameplay) -->
<div id="hud" class="hidden">
  <div class="hud-tl">
    <div class="player-label" id="hudName"></div>
    <div class="death-count" id="hudDeaths"></div>
  </div>
  <div class="stage-badge" id="hudStage"></div>
  <div class="diff-label" id="hudDiff"></div>
  <div class="hud-tr">
    <div id="dashIndicator" style="font-size:11px;color:#f050a0;letter-spacing:.1em"></div>
  </div>
  <div class="controls-hint" id="controlsHint">A/D Move · SPACE Jump (×2) · SHIFT Dash · ESC Quit</div>
</div>

<!-- OUTRO -->
<div id="outroScreen" class="hidden">
  <div class="screen-content">
    <div class="outro-title">Stay tuned...</div>
    <div class="outro-sub">A new game is coming soon!</div>
    <canvas id="outroStars" width="400" height="80" style="margin:20px 0;opacity:.6"></canvas>
    <div class="outro-hint" id="outroHint"></div>
    <div style="margin-top:32px;color:#646e8c;font-size:13px">Press any key or click to close</div>
  </div>
</div>

//  HELPERS
// ═══════════════════════════════════════════════════════════════════════════
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*clamp(t,0,1);
const approach=(c,t,d)=>c<t?Math.min(c+d,t):Math.max(c-d,t);
function smoothDamp(cur,tgt,vel,sm,dt){
  const omega=2/sm,x=omega*dt;
  const e=1/(1+x+0.48*x*x+0.235*x*x*x);
  const change=cur-tgt,temp=(vel+omega*change)*dt;
  vel=(vel-omega*temp)*e;
  return [tgt+(change+temp)*e, vel];
}
function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return [r,g,b];
}

//  PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════════════════
const particles=[];
function spawnParticles(x,y,count,cs,ce,smin,smax,lmin,lmax,grav=0.3,amin=0,amax=Math.PI*2,ssz=5,esz=0){
  const [r1,g1,b1]=hexToRgb(cs), [r2,g2,b2]=hexToRgb(ce);
  for(let i=0;i<count;i++){
    const a=amin+Math.random()*(amax-amin), sp=smin+Math.random()*(smax-smin);
    const l=lmin+Math.random()*(lmax-lmin);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:l,ml:l,r1,g1,b1,r2,g2,b2,ss:ssz,es:esz,grav,
      rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*8});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.vy+=C.GRAVITY*p.grav*dt;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.rot+=p.rs*dt;
  }
}
function drawParticles(ctx,ox,oy,W,H){
  for(const p of particles){
    const t=1-p.life/p.ml;
    const r=p.r1+(p.r2-p.r1)*t, g=p.g1+(p.g2-p.g1)*t, b=p.b1+(p.b2-p.b1)*t;
    const sz=Math.max(0,p.ss+(p.es-p.ss)*t);
    const sx=p.x-ox, sy=p.y-oy;
    if(sx<-sz||sx>W+sz||sy<-sz||sy>H+sz) continue;
    ctx.save();
    ctx.globalAlpha=1-t*0.6;
    ctx.fillStyle=`rgb(${r|0},${g|0},${b|0})`;
    ctx.translate(sx,sy); ctx.rotate(p.rot);
    ctx.fillRect(-sz/2,-sz/2,sz,sz);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

//  CHARACTER DRAWING

function drawChar(ctx,id,x,y,w,h,col,acc,facingRight,state,t){
  ctx.save();
  if(id==='ninja') drawNinja(ctx,x,y,w,h,col,acc,facingRight,state,t);
  else if(id==='robot') drawRobot(ctx,x,y,w,h,col,acc,facingRight,state,t);
  else if(id==='ghost') drawGhost(ctx,x,y,w,h,col,acc,facingRight,state,t);
  else drawKnight(ctx,x,y,w,h,col,acc,facingRight,state,t);
  ctx.restore();
}
function drawNinja(ctx,x,y,w,h,col,acc,fr,state,t){
  const cx=x+w/2;
  // body
  ctx.fillStyle=col; roundRect(ctx,x+4,y+16,w-8,h-16,3); ctx.fill();
  // head
  roundRect(ctx,x+6,y,w-12,18,4); ctx.fill();
  // headband
  ctx.fillStyle=acc; ctx.fillRect(x+5,y+6,w-10,5);
  // eyes
  ctx.fillStyle='#fff';
  const ex=fr?x+w-14:x+8;
  ctx.fillRect(ex,y+8,7,3);
  // scarf
  const sw=Math.sin(t*6)*3;
  ctx.strokeStyle='#c82828'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,y+16);
  ctx.lineTo(cx+(!fr?1:-1)*12,y+20+sw);
  ctx.lineTo(cx+(!fr?1:-1)*8,y+26+sw); ctx.stroke();
  // legs
  ctx.fillStyle=acc;
  const lo=state==='RUN'?Math.sin(t*14)*5|0:0;
  roundRect(ctx,x+5,y+h-14,w/2-4,14+lo,2); ctx.fill();
  roundRect(ctx,cx+2,y+h-14-lo,w/2-4,14,2); ctx.fill();
  // dash trail
  if(state==='DASH'){
    for(let i=1;i<=3;i++){
      const ox2=i*9*(fr?-1:1);
      ctx.globalAlpha=0.18/i;
      ctx.fillStyle=col;
      roundRect(ctx,x+4+ox2,y+16,w-8,h-16,3); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}
function drawRobot(ctx,x,y,w,h,col,acc,fr,state,t){
  const cx=x+w/2;
  // torso
  ctx.fillStyle=col; roundRect(ctx,x+3,y+14,w-6,h-20,2); ctx.fill();
  // panel lines
  ctx.strokeStyle=acc; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x+8,y+22); ctx.lineTo(x+w-8,y+22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,y+22); ctx.lineTo(cx,y+h-20); ctx.stroke();
  // head
  ctx.fillStyle=col; roundRect(ctx,x+5,y,w-10,16,2); ctx.fill();
  // antenna
  ctx.strokeStyle=acc; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(cx,y-8); ctx.stroke();
  ctx.fillStyle=Math.floor(t*3)%2===0?C.ACCENT2:acc;
  ctx.beginPath(); ctx.arc(cx,y-11,3,0,Math.PI*2); ctx.fill();
  // visor
  ctx.fillStyle='#141430'; ctx.fillRect(x+7,y+3,w-14,9);
  ctx.fillStyle=acc+'cc'; ctx.fillRect(x+8,y+4,w-16,7);
  // arms
  ctx.fillStyle=acc;
  roundRect(ctx,x-4,y+16,5,13,2); ctx.fill();
  roundRect(ctx,x+w-1,y+16,5,13,2); ctx.fill();
  // legs
  const lo=state==='RUN'?Math.sin(t*14)*4|0:0;
  roundRect(ctx,x+5,y+h-14,11,14+lo,2); ctx.fill();
  roundRect(ctx,x+w-16,y+h-14,11,14-lo,2); ctx.fill();
}
function drawGhost(ctx,x,y,w,h,col,acc,fr,state,t){
  const cx=x+w/2;
  const fy=Math.sin(t*3)*4;
  const ty=y+fy;
  // glow halo
  const grd=ctx.createRadialGradient(cx,ty+h/2,0,cx,ty+h/2,w*0.8);
  grd.addColorStop(0,col+'30'); grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd; ctx.fillRect(x-20,ty-20,w+40,h+40);
  // body polygon
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(cx,ty+h/2,w/2-4,Math.PI,0);
  const wpts=6;
  for(let i=0;i<=wpts;i++){
    const bx=x+4+(i/wpts)*(w-8);
    const by=ty+h+Math.sin(t*4+i*1.2)*5;
    i===0?ctx.lineTo(bx,by):ctx.lineTo(bx,by);
  }
  ctx.closePath(); ctx.fill();
  // eyes
  const ey=ty+h/3|0;
  const ex1=cx-8, ex2=cx+2;
  ctx.fillStyle=acc;
  ctx.beginPath(); ctx.ellipse(ex1+4,ey+5,4,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ex2+4,ey+5,4,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a0a1e';
  ctx.beginPath(); ctx.arc(ex1+4,ey+5,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2+4,ey+5,2.5,0,Math.PI*2); ctx.fill();
}
function drawKnight(ctx,x,y,w,h,col,acc,fr,state,t){
  const cx=x+w/2;
  // cape
  ctx.fillStyle='#b41e1e';
  const cw=Math.sin(t*4)*4;
  ctx.beginPath();
  ctx.moveTo(cx,y+8); ctx.lineTo(x+2+cw,y+h-4); ctx.lineTo(x+w/3,y+h/2);
  ctx.closePath(); ctx.fill();
  // body
  ctx.fillStyle=col; roundRect(ctx,x+5,y+16,w-10,h-22,3); ctx.fill();
  ctx.strokeStyle=acc; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x+5,y+24); ctx.lineTo(x+w-5,y+24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,y+24); ctx.lineTo(cx,y+h-10); ctx.stroke();
  // helmet
  ctx.fillStyle=col; roundRect(ctx,x+4,y,w-8,18,4); ctx.fill();
  // visor
  ctx.fillStyle='#141428'; ctx.fillRect(x+7,y+7,w-14,5);
  ctx.strokeStyle=acc+'cc'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x+8,y+9); ctx.lineTo(x+w-8,y+9); ctx.stroke();
  // plume
  ctx.fillStyle='#dc2828';
  ctx.beginPath();
  ctx.moveTo(cx-2,y-2); ctx.lineTo(cx-5,y-11); ctx.lineTo(cx,y-15);
  ctx.lineTo(cx+5,y-11); ctx.lineTo(cx+2,y-2); ctx.closePath(); ctx.fill();
  // legs
  const lo=state==='RUN'?Math.sin(t*12)*5|0:0;
  ctx.fillStyle=acc;
  roundRect(ctx,x+6,y+h-14,10,14+lo,2); ctx.fill();
  roundRect(ctx,cx+2,y+h-14,10,14-lo,2); ctx.fill();
  // shield
  const shx=fr?x-7:x+w-1;
  ctx.fillStyle='#b48228'; roundRect(ctx,shx,y+20,8,14,2); ctx.fill();
  ctx.strokeStyle=acc; ctx.lineWidth=1; roundRect(ctx,shx,y+20,8,14,2); ctx.stroke();
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
}

//  PLATFORM DRAWING
// ═══════════════════════════════════════════════════════════════════════════
function drawPlatform(ctx,p,ox,oy,W,H){
  const sx=p.rx-ox, sy=p.ry-oy;
  if(sx>W+20||sx+p.w<-20||sy>H+20||sy+p.h<-20) return;
  const bc=p.deadly?C.DEAD_PLAT:p.moving?C.MPLAT:C.PLAT;
  const tc=p.deadly?C.DEAD_TOP:p.moving?C.MPLAT_TOP:C.PLAT_TOP;
  // body
  ctx.fillStyle=bc; ctx.fillRect(sx,sy,p.w,p.h);
  // top edge glow
  ctx.strokeStyle=tc; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx+p.w,sy); ctx.stroke();
  // subtle glow
  const grd=ctx.createLinearGradient(0,sy-4,0,sy+8);
  grd.addColorStop(0,tc+'44'); grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd; ctx.fillRect(sx,sy-4,p.w,12);
}
function drawGoal(ctx,gx,gy,gw,gh,ox,oy,t){
  const sx=gx-ox, sy=gy-oy;
  const cx=sx+gw/2, cy=sy+gh/2, r=gw/2;
  const pulse=Math.sin(t*4)*0.3+0.7;
  // outer rings
  for(let i=3;i>0;i--){
    ctx.globalAlpha=0.15*pulse/i;
    ctx.fillStyle=C.GOAL;
    ctx.beginPath(); ctx.arc(cx,cy,r+i*7,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // core
  ctx.fillStyle=C.GOAL;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  // inner bright
  ctx.fillStyle='#fffde0';
  ctx.beginPath(); ctx.arc(cx,cy,r*0.45*pulse,0,Math.PI*2); ctx.fill();
  // rays
  for(let i=0;i<6;i++){
    const a=t*2+i*Math.PI/3;
    const x2=cx+Math.cos(a)*r*0.75, y2=cy+Math.sin(a)*r*0.75;
    ctx.globalAlpha=0.5*pulse;
    ctx.strokeStyle=C.GOAL; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x2,y2); ctx.stroke();
  }
  ctx.globalAlpha=1;
}

let playerName='', charId='ninja', charData=CHARS[0];

// Camera
let camX=0,camY=0,camVX=0,camVY=0,lookX=0,lookVX=0,trauma=0,shakeT=0;

// Player
let px,py,pvx,pvy,facing,onGround,wasGround,jumpsLeft;
let coyoteT,jbufT,dashing,dashT,dashCD,dashDir,invT,animT;
let killReason='';

function loadLevel(idx){

  coyoteT=0; jbufT=0; dashing=false; dashT=0; dashCD=0; dashDir=1; invT=0; animT=0;

  stageT=0;
  particles.length=0;

const keys={};
window.addEventListener('keydown',e=>{
  keys[e.key]=true; keys[e.code]=true;
  if(gamePhase==='play'){
    if(e.code==='Space'||e.code==='ArrowUp'||e.key==='w'||e.key==='W'){
      jbufT=C.JBUF; e.preventDefault();
    }
    if(e.code==='ShiftLeft'||e.code==='ShiftRight') tryDash();
    if(e.key==='Escape') triggerQuit();
  }
  if(gamePhase==='complete'||gamePhase==='outro'){
    gamePhase='outro2';
  }
});
window.addEventListener('keyup',e=>{
  delete keys[e.key]; delete keys[e.code];
  if(e.code==='Space'||e.code==='ArrowUp') cutJump();
});

function isLeft(){ return keys['a']||keys['A']||keys['ArrowLeft']; }
function isRight(){ return keys['d']||keys['D']||keys['ArrowRight']; }

function cutJump(){ if(pvy<0) pvy*=0.45; }

function tryDash(){
  if(dashCD>0||dashing) return;
  dashing=true; dashT=C.DASH_DUR; dashCD=C.DASH_CD;
  dashDir=facing?1:-1; invT=C.DASH_DUR;
  pvx=0; pvy=0;
}
function triggerQuit(){
  gamePhase='outro'; phaseT=0;
}

// ═══════════════════════════════════════════════════════════════════════════
//  PHYSICS UPDATE
// ═══════════════════════════════════════════════════════════════════════════
function updatePlayer(dt){
  animT+=dt;
  dashCD=Math.max(0,dashCD-dt);
  invT=Math.max(0,invT-dt);
  jbufT=Math.max(0,jbufT-dt);
  if(!onGround) coyoteT=Math.max(0,coyoteT-dt);

  if(dashing){
    dashT-=dt;
    if(dashT<=0){ dashing=false; pvx=dashDir*C.P_SPD*0.55; }
    else{
      px+=dashDir*C.DASH_SPD*dt;
      spawnParticles(px+18,py+24,3,charData.color,C.BG,10,40,0.1,0.22,0,0,Math.PI*2,4,0);
    }
    return;
  }

  // Gravity
  const lvl=currentLevel;
  const gm=lvl.grav||1;
  const wx=lvl.wind||0;
  let grav=C.GRAVITY*gm*(pvy>0?C.FALL_MULT:1);
  pvy=Math.min(pvy+grav*dt, C.TERM);
  pvx+=wx*dt;

  // Input
  let ax=0;
  if(isRight()){ax=1;facing=true;}
  if(isLeft()){ax=-1;facing=false;}
  const accel=onGround?C.P_ACCEL_G:C.P_ACCEL_A;
  const decel=onGround?C.P_DECEL_G:C.P_DECEL_A;
  if(ax) pvx+=ax*accel*dt;
  else pvx=approach(pvx,0,decel*dt);
  pvx=clamp(pvx,-C.P_SPD*1.5,C.P_SPD*1.5);

  // Jump
  const canJump=onGround||coyoteT>0||jumpsLeft>0;
  if(jbufT>0&&canJump){
    pvy=C.P_JUMP; jbufT=0; coyoteT=0; onGround=false;
    jumpsLeft=Math.max(0,jumpsLeft-1);
    spawnParticles(px+18,py+48,10,charData.color,'#103830',30,120,0.2,0.45,0.15,Math.PI,Math.PI*2,5,0);
  }

  // Integrate
  px+=pvx*dt; py+=pvy*dt;
}

function updatePlatforms(dt){
  for(const p of platStates){
    if(!p.moving) continue;
    const range=p.mx+p.my+1;
    p.phase+=dt*p.speed/(range*2);
    p.rx=p.x+Math.sin(p.phase*Math.PI*2)*p.mx;
    p.ry=p.y+Math.cos(p.phase*Math.PI*2)*p.my;
  }
}

const PW=36,PH=48;
function resolveCollisions(){
  wasGround=onGround;
  onGround=false;
  for(const p of platStates){
    const bx=p.rx, by=p.ry;
    if(px<bx+p.w&&px+PW>bx&&py<by+p.h&&py+PH>by){
      if(p.deadly){ killPlayer('Spikes!'); return; }
      const dx1=px+PW-bx, dx2=bx+p.w-px;
      const dy1=py+PH-by, dy2=by+p.h-py;
      const minX=Math.min(dx1,dx2), minY=Math.min(dy1,dy2);
      if(minX<minY){
        px+=dx1<dx2?-dx1:dx2; pvx=0;
      } else {
        if(dy1<dy2){
          py-=dy1; if(pvy>0){ pvy=0; onGround=true; }
        } else { py+=dy2; if(pvy<0) pvy=0; }
      }
    }
  }
  if(!wasGround&&onGround){
    jumpsLeft=C.MAX_JUMPS; coyoteT=C.COYOTE;
    spawnParticles(px+18,py+PH,12,charData.color,C.BG,60,180,0.15,0.4,0.5,Math.PI,Math.PI*2,4,0);
    if(Math.abs(pvy)>400) trauma=Math.min(1,trauma+0.25);
  }
  if(onGround&&!wasGround) coyoteT=C.COYOTE;
}

function killPlayer(reason){
  spawnParticles(px+PW/2,py+PH/2,24,charData.color,C.BG,100,320,0.3,0.7,0.6,0,Math.PI*2,5,0);
  trauma=Math.min(1,trauma+0.5);
  killReason=reason; totalDeaths++;
  gamePhase='dead'; phaseT=0;
}

function checkGoal(){
  const [gx,gy,gw,gh]=currentLevel.goal;
  if(px<gx+gw&&px+PW>gx&&py<gy+gh&&py+PH>gy){
    spawnParticles(gx+gw/2,gy+gh/2,30,'#ffc83c','#c86400',80,280,0.4,1.0,0.2,0,Math.PI*2,6,0);
    trauma=Math.min(1,trauma+0.3);
    gamePhase='win'; phaseT=0;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════════════════════
function updateCamera(dt){
  const lvl=currentLevel;
  const lt=80*(facing?1:-1);
  [lookX,lookVX]=smoothDamp(lookX,lt,lookVX,0.3,dt);
  const tx=clamp(px+PW/2-W/2+lookX, 0, Math.max(0,lvl.W-W));
  const ty=clamp(py+PH/2-H/2, 0, Math.max(0,lvl.H-H));
  [camX,camVX]=smoothDamp(camX,tx,camVX,0.09,dt);
  [camY,camVY]=smoothDamp(camY,ty,camVY,0.10,dt);
  trauma=Math.max(0,trauma-dt*1.4);
  shakeT+=dt*28;
}

function getCamOffset(){
  if(trauma<=0) return [camX,camY];
  const m=trauma*trauma*18;
  const sx=(Math.sin(shakeT*1.7)+Math.sin(shakeT*2.3)*0.5)*m;
  const sy=(Math.sin(shakeT*2.1)+Math.sin(shakeT*1.4)*0.5)*m;
  return [camX+sx,camY+sy];
}

// ═══════════════════════════════════════════════════════════════════════════
//  DRAW GAME WORLD
// ═══════════════════════════════════════════════════════════════════════════
function drawWorld(ox,oy,t){
  // BG gradient
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,C.BG); bg.addColorStop(1,C.BG2);
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Parallax grid
  ctx.strokeStyle='rgba(24,24,58,0.5)'; ctx.lineWidth=1;
  const gx0=(-ox*0.18)%80, gy0=(-oy*0.18)%80;
  for(let gx=gx0;gx<W+80;gx+=80){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(let gy=gy0;gy<H+80;gy+=80){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}

  // Platforms
  for(const p of platStates) drawPlatform(ctx,p,ox,oy,W,H);

  // Goal
  const [gx,gy,gw,gh]=currentLevel.goal;
  drawGoal(ctx,gx,gy,gw,gh,ox,oy,t);

  // Particles
  drawParticles(ctx,ox,oy,W,H);

  // Player
  if(gamePhase==='play'||(gamePhase==='dead'&&phaseT<0.3)){
    if(invT>0&&Math.floor(animT*10)%2===0){/* blink */}
    else{
      // glow
      const pr=ctx.createRadialGradient(px+PW/2-ox,py+PH/2-oy,0,px+PW/2-ox,py+PH/2-oy,40);
      pr.addColorStop(0,charData.color+'28'); pr.addColorStop(1,'transparent');
      ctx.fillStyle=pr; ctx.fillRect(px-ox-30,py-oy-30,PW+60,PH+60);
      drawChar(ctx,charId,px-ox|0,py-oy|0,PW,PH,charData.color,charData.accent,facing,getPlayerState(),animT);
    }
  }
}
function getPlayerState(){
  if(dashing) return 'DASH';
  if(!onGround&&pvy<0) return 'JUMP';
  if(!onGround) return 'FALL';
  if(Math.abs(pvx)>20) return 'RUN';
  return 'IDLE';
}

// ═══════════════════════════════════════════════════════════════════════════
//  OVERLAY SCREENS (drawn on canvas)
// ═══════════════════════════════════════════════════════════════════════════
function drawStageIntro(t){
  const lvl=currentLevel;
  const a=clamp(t/0.5,0,1);
  ctx.fillStyle=`rgba(8,8,18,${clamp(t*3,0,0.88)})`;
  ctx.fillRect(0,0,W,H);

  ctx.globalAlpha=a;
  // Stage number
  ctx.font=`bold ${W>700?72:44}px "JetBrains Mono",monospace`;
  ctx.fillStyle=C.ACCENT; ctx.textAlign='center';
  ctx.fillText(`STAGE ${levelIndex+1}`,W/2,H/2-90);

  ctx.font=`bold ${W>700?26:18}px "Space Grotesk",sans-serif`;
  ctx.fillStyle=C.TEXT;
  ctx.fillText(lvl.name,W/2,H/2-40);

  ctx.font=`${W>700?15:12}px "Space Grotesk",sans-serif`;
  ctx.fillStyle=C.DIM;
  ctx.fillText(lvl.tip,W/2,H/2+2);

  // Diff badge
  const dc=lvl.diff==='IMPOSSIBLE'?C.ACCENT2:lvl.diff==='HARD'?C.ACCENT3:C.ACCENT;
  ctx.font=`bold 13px "JetBrains Mono",monospace`;
  ctx.fillStyle=dc;
  ctx.fillText(lvl.diff,W/2,H/2+36);
  ctx.globalAlpha=1; ctx.textAlign='left';
}
function drawDeadOverlay(t){
  ctx.fillStyle=`rgba(50,0,0,${clamp(t*3,0,0.75)})`;
  ctx.fillRect(0,0,W,H);
  if(t<0.3) return;
  const a=clamp((t-0.3)*3,0,1);
  ctx.globalAlpha=a;
  ctx.font=`bold ${W>700?52:32}px "JetBrains Mono",monospace`;
  ctx.fillStyle='#f03c3c'; ctx.textAlign='center';
  ctx.fillText('YOU DIED',W/2,H/2-30);
  ctx.font=`16px "Space Grotesk",sans-serif`;
  ctx.fillStyle=C.DIM; ctx.fillText(killReason,W/2,H/2+14);
  ctx.font=`13px "Space Grotesk",sans-serif`;
  ctx.fillText('Restarting stage...',W/2,H/2+42);
  ctx.globalAlpha=1; ctx.textAlign='left';
}
function drawWinOverlay(t){
  ctx.fillStyle=`rgba(0,30,0,${clamp(t*3,0,0.75)})`;
  ctx.fillRect(0,0,W,H);
  if(t<0.2) return;
  const a=clamp((t-0.2)*3,0,1);
  ctx.globalAlpha=a;
  ctx.font=`bold ${W>700?56:34}px "JetBrains Mono",monospace`;
  ctx.fillStyle=C.GOAL; ctx.textAlign='center';
  ctx.fillText('STAGE CLEAR!',W/2,H/2-40);
  if(levelIndex<LEVELS.length-1){
    ctx.font=`20px "Space Grotesk",sans-serif`;
    ctx.fillStyle=C.DIM;
    ctx.fillText(`Next: Stage ${levelIndex+2}`,W/2,H/2+14);
  }
  ctx.globalAlpha=1; ctx.textAlign='left';
}
function drawCompleteScreen(t){
  // starfield
  ctx.fillStyle=C.BG; ctx.fillRect(0,0,W,H);
  // random stars
  const seed=42; let s=seed;
  function rng(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/4294967296;}
  for(let i=0;i<100;i++){
    const sx=rng()*W,sy=rng()*H;
    ctx.fillStyle=`rgba(200,210,255,${rng()*0.7+0.2})`;
    ctx.fillRect(sx,sy,1.5,1.5);
  }
  const a=clamp(t*1.5,0,1);
  ctx.globalAlpha=a;
  ctx.font=`bold ${W>700?64:38}px "JetBrains Mono",monospace`;
  ctx.fillStyle=C.GOAL; ctx.textAlign='center';
  ctx.fillText('YOU WIN!',W/2,H/2-110);
  ctx.font=`bold ${W>700?26:18}px "Space Grotesk",sans-serif`;
  ctx.fillStyle=charData.color;
  ctx.fillText(`Congratulations, ${playerName}!`,W/2,H/2-55);
  ctx.font=`17px "Space Grotesk",sans-serif`;
  ctx.fillStyle=C.DIM;
  ctx.fillText(`All 20 stages complete  •  Deaths: ${totalDeaths}`,W/2,H/2-18);
  if(t>2){
    ctx.font=`14px "Space Grotesk",sans-serif`;
    ctx.fillStyle=C.DIM;
    ctx.fillText('Press any key to continue',W/2,H/2+20);
  }
  // draw character
  drawChar(ctx,charId,W/2-35,H/2+40,70,100,charData.color,charData.accent,true,'IDLE',t);
  ctx.globalAlpha=1; ctx.textAlign='left';
}

// ═══════════════════════════════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════════════════════════════
function updateHUD(){
  const lvl=currentLevel;
  document.getElementById('hudName').textContent=playerName+' · '+charData.name;
  document.getElementById('hudDeaths').textContent=`Deaths: ${totalDeaths}`;
  document.getElementById('hudStage').textContent=`STAGE  ${levelIndex+1} / ${LEVELS.length}`;
  const dc=lvl.diff==='IMPOSSIBLE'?C.ACCENT2:lvl.diff==='HARD'?C.ACCENT3:C.ACCENT;
  const dl=document.getElementById('hudDiff');
  dl.textContent=lvl.diff; dl.style.color=dc;
  const di=document.getElementById('dashIndicator');
  if(dashCD<=0) {di.textContent='DASH READY'; di.style.color=C.ACCENT2;}
  else {di.textContent=`DASH ${dashCD.toFixed(1)}s`; di.style.color=C.DIM;}
  // timer
  const timer=document.getElementById('hudStage');// reuse
  if(timeLeft!=null){
    // draw timer via canvas overlay
  }
  // fade controls hint
  const ch=document.getElementById('controlsHint');
  ch.style.opacity=stageT<8?Math.min(1,(8-stageT)/3):0;
}

// ═══════════════════════════════════════════════════════════════════════════
//  AMBIENT GRID BACKGROUND
// ═══════════════════════════════════════════════════════════════════════════
let bgT=0;
function drawBGGrid(dt){
  bgT+=dt;
  gctx.clearRect(0,0,W,H);
  gctx.strokeStyle='rgba(24,24,58,0.5)'; gctx.lineWidth=1;
  for(let gx=0;gx<W;gx+=80){gctx.beginPath();gctx.moveTo(gx,0);gctx.lineTo(gx,H);gctx.stroke();}
  for(let gy=0;gy<H;gy+=80){gctx.beginPath();gctx.moveTo(0,gy);gctx.lineTo(W,gy);gctx.stroke();}
  // scanline
  const sy=((bgT*70)%(H+40))-20;
  const sg=gctx.createLinearGradient(0,sy-2,0,sy+4);
  sg.addColorStop(0,'transparent'); sg.addColorStop(0.5,'rgba(80,240,200,0.05)'); sg.addColorStop(1,'transparent');
  gctx.fillStyle=sg; gctx.fillRect(0,sy-2,W,6);
}

// ═══════════════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════════════════
let lastT=performance.now(), globalT=0;
function loop(now){
  const dt=Math.min((now-lastT)/1000,0.05); lastT=now; globalT+=dt;
  drawBGGrid(dt);

  if(gamePhase==='name'||gamePhase==='char'||gamePhase==='welcome'){
    requestAnimationFrame(loop); return;
  }

  if(gamePhase==='stagein'){
    phaseT+=dt;
    const [ox,oy]=getCamOffset();
    drawWorld(ox,oy,globalT);
    drawStageIntro(phaseT);
    if(phaseT>2.5){ gamePhase='play'; phaseT=0; document.getElementById('hud').classList.remove('hidden'); }
    requestAnimationFrame(loop); return;
  }

  if(gamePhase==='play'){
    phaseT+=dt; stageT+=dt;
    if(timeLeft!=null){
      timeLeft-=dt;
      if(timeLeft<=0){ killPlayer("Time's up!"); }
    }
    updatePlatforms(dt);
    updatePlayer(dt);
    resolveCollisions();
    if(gamePhase==='play'){
      if(py>currentLevel.H+120) killPlayer('Fell off the edge!');
      if(px<-100) killPlayer('Out of bounds!');
    }
    if(gamePhase==='play') checkGoal();
    updateCamera(dt);
    updateParticles(dt);
    const [ox,oy]=getCamOffset();
    drawWorld(ox,oy,globalT);
    // timer on canvas
    if(timeLeft!=null){
      const tl=Math.max(0,timeLeft);
      ctx.font=`bold 22px "JetBrains Mono",monospace`;
      ctx.textAlign='center';
      ctx.fillStyle=tl<6?C.ACCENT2:C.ACCENT3;
      ctx.fillText(`⏱ ${tl.toFixed(1)}s`,W/2,22);
      ctx.textAlign='left';
    }
    updateHUD();
    requestAnimationFrame(loop); return;
  }

  if(gamePhase==='dead'){
    phaseT+=dt;
    const [ox,oy]=getCamOffset();
    updateParticles(dt);
    updateCamera(dt);
    drawWorld(ox,oy,globalT);
    drawDeadOverlay(phaseT);
    if(phaseT>1.8){ loadLevel(levelIndex); gamePhase='stagein'; phaseT=0; }
    requestAnimationFrame(loop); return;
  }

  if(gamePhase==='win'){
    phaseT+=dt;
    const [ox,oy]=getCamOffset();
    updateParticles(dt);
    drawWorld(ox,oy,globalT);
    drawWinOverlay(phaseT);
    if(phaseT>2.5){
      if(levelIndex>=LEVELS.length-1){ gamePhase='complete'; phaseT=0; document.getElementById('hud').classList.add('hidden'); }
      else{ levelIndex++; loadLevel(levelIndex); }
    }
    requestAnimationFrame(loop); return;
  }

  if(gamePhase==='complete'){
    phaseT+=dt;
    ctx.fillStyle=C.BG; ctx.fillRect(0,0,W,H);
    updateParticles(dt); drawParticles(ctx,0,0,W,H);
    drawCompleteScreen(phaseT);
    requestAnimationFrame(loop); return;
  }

  if(gamePhase==='outro'||gamePhase==='outro2'){
    phaseT+=dt;
    ctx.fillStyle=C.BG; ctx.fillRect(0,0,W,H);
    // stars
    let s2=99;
    function rng2(){s2=(s2*1664525+1013904223)&0xffffffff;return(s2>>>0)/4294967296;}
    for(let i=0;i<80;i++){
      const sx=rng2()*W,sy=rng2()*H, br=Math.sin(globalT*rng2()*3)*0.4+0.6;
      ctx.fillStyle=`rgba(180,200,255,${br*0.5})`; ctx.fillRect(sx,sy,1.5,1.5);
    }
    // scan
    const scy=((phaseT*60)%(H+40))-20;
    const scg=ctx.createLinearGradient(0,scy,0,scy+4);
    scg.addColorStop(0,'transparent'); scg.addColorStop(.5,'rgba(80,240,200,0.06)'); scg.addColorStop(1,'transparent');
    ctx.fillStyle=scg; ctx.fillRect(0,scy,W,4);
    // text
    const a=clamp(phaseT*1.5,0,1);
    ctx.globalAlpha=a; ctx.textAlign='center';
    const pulse=0.9+0.1*Math.sin(phaseT*3);
    ctx.font=`bold ${W>700?56:34}px "JetBrains Mono",monospace`;
    ctx.fillStyle=C.ACCENT; ctx.fillText('Stay tuned...',W/2,H/2-90);
    if(phaseT>0.6){
      ctx.globalAlpha=clamp((phaseT-0.6)*2,0,1);
      ctx.font=`bold ${W>700?28:20}px "Space Grotesk",sans-serif`;
      ctx.fillStyle=C.ACCENT3;
      ctx.fillText('A new game is coming soon!',W/2,H/2-30);
    }
    if(phaseT>1.4){
      ctx.globalAlpha=clamp((phaseT-1.4)*2,0,1);
      ctx.font=`15px "Space Grotesk",sans-serif`;
      ctx.fillStyle=C.DIM;
      ctx.fillText(`Thanks for playing, ${playerName||'Player'}  •  Click or press any key`,W/2,H/2+20);
    }
    ctx.font=`bold ${W>700?52*pulse|0:32}px "JetBrains Mono",monospace`;
    ctx.fillStyle=C.ACCENT2;
    ctx.globalAlpha=phaseT>1?clamp((phaseT-1)*2,0,1):0;
    ctx.fillText('NEON RUN',W/2,H/2+90);
    ctx.globalAlpha=1; ctx.textAlign='left';
    if(gamePhase==='outro2'||phaseT>8) window.close();
    requestAnimationFrame(loop); return;
  }

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════════════
//  NAME SCREEN LOGIC
// ═══════════════════════════════════════════════════════════════════════════
const nameInput=document.getElementById('nameInput');
const nameErr=document.getElementById('nameErr');
const nameBtn=document.getElementById('nameBtn');
nameInput.focus();

function submitName(){
  const v=nameInput.value.trim();
  if(v.length<2){nameErr.textContent='Name must be at least 2 characters!';return;}
  if(v.length>16){nameErr.textContent='Name too long (max 16)!';return;}
  playerName=v;
  document.getElementById('nameScreen').classList.add('hidden');
  showCharScreen();
}
nameBtn.addEventListener('click',submitName);
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter') submitName();});

// ═══════════════════════════════════════════════════════════════════════════
//  CHAR SELECT
// ═══════════════════════════════════════════════════════════════════════════
let selectedChar=0;
function showCharScreen(){
  document.getElementById('charSubtitle').textContent=`Welcome, ${playerName} — pick your fighter`;
  const grid=document.getElementById('charGrid');
  grid.innerHTML='';
  CHARS.forEach((ch,i)=>{
    const card=document.createElement('div');
    card.className='char-card'+(i===0?' selected':'');
    card.style.setProperty('--cc',ch.color);
    // Preview canvas
    const cc=document.createElement('canvas');
    cc.className='char-canvas'; cc.width=80; cc.height=110;
    const cctx=cc.getContext('2d');
    let charAnimT=0;
    function animChar(){
      cctx.clearRect(0,0,80,110);
      charAnimT+=0.016;
      drawChar(cctx,ch.id,10,10,60,90,ch.color,ch.accent,true,'IDLE',charAnimT);
      requestAnimationFrame(animChar);
    }
    animChar();
    card.appendChild(cc);
    const nm=document.createElement('div');
    nm.className='char-name'; nm.style.color=ch.color; nm.textContent=ch.name;
    const dc=document.createElement('div');
    dc.className='char-desc'; dc.textContent=ch.desc;
    const badge=document.createElement('div');
    badge.className='char-badge';
    badge.style.background=ch.color+'25'; badge.style.color=ch.color;
    badge.textContent='SELECTED';
    card.appendChild(nm); card.appendChild(dc); card.appendChild(badge);
    card.addEventListener('click',()=>selectChar(i));
    grid.appendChild(card);
  });
  document.getElementById('charScreen').classList.remove('hidden');
  document.addEventListener('keydown',charKeyHandler);
}
function selectChar(i){
  selectedChar=i;
  document.querySelectorAll('.char-card').forEach((c,j)=>{
    c.classList.toggle('selected',j===i);
  });
}
function charKeyHandler(e){
  if(e.key==='ArrowLeft'||e.key==='a') selectChar((selectedChar-1+CHARS.length)%CHARS.length);
  if(e.key==='ArrowRight'||e.key==='d') selectChar((selectedChar+1)%CHARS.length);
  if(e.key==='Enter') startGame();
}
document.getElementById('charBtn').addEventListener('click',startGame);
function startGame(){
  document.removeEventListener('keydown',charKeyHandler);
  charId=CHARS[selectedChar].id;
  charData=CHARS[selectedChar];
  document.getElementById('charScreen').classList.add('hidden');
  showWelcome();
}

// ═══════════════════════════════════════════════════════════════════════════
//  WELCOME SCREEN
// ═══════════════════════════════════════════════════════════════════════════
function showWelcome(){
  const ws=document.getElementById('welcomeScreen');
  ws.classList.remove('hidden');
  document.getElementById('welcomeMsg').textContent=`Welcome, ${playerName}!`;
  document.getElementById('welcomeMsg').style.color=charData.color;
  document.getElementById('welcomeSub').textContent=`Playing as ${charData.name}  •  Good luck!`;
  const wcc=document.getElementById('welcomeCharCanvas');
  const wctx=wcc.getContext('2d');
  let wt=0;
  function animWelcome(){
    if(!ws.classList.contains('hidden')){
      wctx.clearRect(0,0,100,140);
      drawChar(wctx,charId,10,10,80,110,charData.color,charData.accent,true,'IDLE',wt);
      wt+=0.016;
      requestAnimationFrame(animWelcome);
    }
  }
  animWelcome();
  setTimeout(()=>{
    ws.classList.add('hidden');
    levelIndex=0; totalDeaths=0;
    loadLevel(0);
    gamePhase='stagein'; phaseT=0;
    requestAnimationFrame(loop);
  },2200);
}

// ═══════════════════════════════════════════════════════════════════════════
//  WINDOW CLOSE → OUTRO
// ═══════════════════════════════════════════════════════════════════════════
window.addEventListener('beforeunload',()=>{
  // can't reliably show screen, but save is already wiped (no save system in browser)
});
document.addEventListener('click',()=>{
  if(gamePhase==='outro') gamePhase='outro2';
  if(gamePhase==='complete'&&phaseT>2) gamePhase='outro'; phaseT=0;
});

// start bg loop immediately
requestAnimationFrame(loop);
</script>
